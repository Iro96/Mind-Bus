version: '3.9'
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai_agent_platform_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ai_agent
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - qdrant

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai_agent_platform_worker
    command: ["python", "-m", "worker.main"]
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ai_agent
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - qdrant
      - redis

  rq_worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai_agent_platform_rq_worker
    command: ["rq", "worker", "ai_agent_tasks"]
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  postgres:
    image: postgres:15
    container_name: ai_agent_platform_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_agent_platform_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    container_name: ai_agent_platform_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  qdrant_data:
